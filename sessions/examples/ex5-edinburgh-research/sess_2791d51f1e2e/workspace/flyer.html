<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Event Flyer</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  article { max-width: 600px; margin: 0 auto; background: #f9f9f9; padding: 20px; border-radius: 8px; }
  h1 { color: #333; }
  dl { display: grid; grid-template-columns: max-content auto; gap: 10px 20px; }
  dt { font-weight: bold; }
</style>
</head>
<body>
  <article>
    <h1 data-testid="venue_name">Haymarket Tap</h1>
    <dl>
      <dt>Address</dt><dd data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</dd>
      <dt>Date</dt><dd data-testid="date">2026-04-25</dd>
      <dt>Time</dt><dd data-testid="time">19:30</dd>
      <dt>Party Size</dt><dd data-testid="party_size">6</dd>
      <dt>Weather</dt><dd>
        <span data-testid="condition">cloudy</span>,
        <span data-testid="temperature_c">12</span>
      </dd>
      <dt>Total Cost</dt><dd data-testid="total_gbp">£557</dd>
      <dt>Deposit Required</dt><dd data-testid="deposit_required_gbp">£112</dd>
    </dl>
  </article>
</body>
</html>
